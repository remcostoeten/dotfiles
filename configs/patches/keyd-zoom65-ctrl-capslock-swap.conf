# Zoom65 — undo firmware Ctrl <-> CapsLock swap
#
# The "UBEST zoom65 wireless" board ships with Left Ctrl and Caps Lock swapped
# in its firmware. This keyd patch cancels that out at the OS level.
#
# It is scoped with [ids] to ONLY this keyboard (USB Vendor=1ea7 Product=7777),
# so any other keyboard (laptop built-in, second board, etc.) is left untouched.
#
# Installed by symlinking this file to /etc/keyd/zoom65.conf
# See configs/patches/README.md for install / verify / uninstall steps.

[ids]
1ea7:7777

[main]
# Each physical key is remapped to the key it was *meant* to be.
# The key labelled Caps becomes a real Control modifier: layer(control) makes it
# behave correctly when held (Caps+C => Ctrl+C), not just as a single tap.
capslock = layer(control)
# The key labelled Ctrl becomes a plain Caps Lock toggle.
leftcontrol = capslock

[control]
leftcontrol = 1
