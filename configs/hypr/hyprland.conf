$mainMod = SUPER
$terminal = ghostty
$fallbackTerminal = alacritty
$launcher = $HOME/.config/dotfiles/bin/launcher
$fileManager = pcmanfm
$accent = d6a16f
$accent2 = d87a72

monitor = ,preferred,auto,1

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1
env = TERMINAL,ghostty

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user start xdg-desktop-portal-hyprland.service
exec-once = awww-daemon
exec-once = awww img "$HOME/.config/dotfiles/configs/wallpapers/current"
exec-once = waybar
exec-once = swaync
exec-once = cliphist-daemon
exec-once = ghostty
exec-once = nm-applet --indicator
exec-once = $HOME/.local/bin/bluetooth-tray
exec-once = hypridle

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

general {
    gaps_in = 10
    gaps_out = 18
    border_size = 1
    col.active_border = rgba(d6a16f77) rgba(d87a7266) 35deg
    col.inactive_border = rgba(2b292966)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 8
}

decoration {
    rounding = 9
    active_opacity = 0.92
    inactive_opacity = 0.86
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 3
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000066)
        offset = 0 6
    }
}

animations {
    enabled = true
    bezier = calm, 0.16, 1, 0.3, 1
    bezier = snap, 0.22, 1, 0.36, 1
    bezier = slick, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 4, slick, slide
    animation = windowsIn, 1, 4, slick, slide
    animation = windowsOut, 1, 3, snap, popin 80%
    animation = border, 1, 5, calm
    animation = fade, 1, 4, calm
    animation = workspaces, 1, 4, slick, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    vfr = true
}

xwayland {
    force_zero_scaling = true
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar
layerrule = xray on, match:namespace waybar
layerrule = blur on, match:namespace swaync
layerrule = ignore_alpha 0.2, match:namespace swaync

windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:class ^(pavucontrol)$, size (monitor_w*0.40) (monitor_h*0.45)
windowrule = match:class ^(pavucontrol)$, center on
windowrule = match:class ^(ghostty)$, opacity 0.94 0.90
windowrule = match:class ^(Alacritty)$, opacity 0.94 0.90

bind = $mainMod, Return, exec, $terminal || $fallbackTerminal
bind = $mainMod, Space, exec, $launcher
bind = CTRL, Space, exec, $launcher
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, brave || firefox
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu --prompt "clipboard " | cliphist decode | wl-copy
bind = $mainMod SHIFT, R, exec, hyprctl reload && pkill waybar; waybar
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, S, togglesplit
bind = $mainMod SHIFT, L, exec, hyprlock

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, left, exec, hyprctl dispatch setfloating active && hyprctl dispatch resizeactive exact 50% 100% && hyprctl dispatch movewindow l
bind = $mainMod, right, exec, hyprctl dispatch setfloating active && hyprctl dispatch resizeactive exact 50% 100% && hyprctl dispatch movewindow r
bind = $mainMod, up, fullscreen, 1
bind = $mainMod, down, settiled

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, left, movetoworkspace, -1
bind = $mainMod SHIFT, right, movetoworkspace, +1
bind = $mainMod SHIFT, up, togglespecialworkspace, hidden
bind = $mainMod SHIFT, down, movetoworkspacesilent, special:hidden

bind = $mainMod CTRL, H, resizeactive, -40 0
bind = $mainMod CTRL, J, resizeactive, 0 40
bind = $mainMod CTRL, K, resizeactive, 0 -40
bind = $mainMod CTRL, L, resizeactive, 40 0
bind = CTRL, Escape, cyclenext, tiled
bind = CTRL SHIFT, Escape, cyclenext, prev tiled

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"
bind = CTRL SHIFT, equal, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = CTRL SHIFT, minus, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

workspace = 1, name:dev
workspace = 2, name:web
workspace = 3, name:term
workspace = 4, name:chat
workspace = 5, name:media

# fantasy omega overlay
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, float 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, pin 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, no_blur 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, no_shadow 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, no_anim 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, border_size 0
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, rounding 0
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, opaque 0
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, no_focus 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, no_initial_focus 1
windowrule = match:class ^(fc2o.*|[0-9a-f]+\.out.*)$, suppress_event maximize
windowrule = match:class ^(cs2)$, tile 1
windowrule = match:class ^(cs2)$, fullscreen 0
windowrule = match:class ^(cs2)$, suppress_event fullscreen maximize activate activatefocus
