conky.config = {
    alignment = 'bottom_left',
    background = true,
    border_width = 0,
    cpu_avg_samples = 2,
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = true,
    default_shade_color = '1a1028',
    gap_x = 60,
    gap_y = 80,
    minimum_width = 0,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    update_interval = 1.0,
    use_xft = true,
    xftalpha = 1,
    override_utf8_locale = true,
    color0 = 'FFFFFF',
    color1 = 'f0d6c0',
    color2 = 'e8944a',
    color3 = 'b065a0',
    color4 = '7b6baa',
};

conky.text = [[
${font Inter Black:size=80}${color0}${time %H:%M}
${voffset -8}${font Inter Bold:size=20}${color1}${time %A, %B %d}
${voffset 10}${color2}${hr 2}
${voffset 10}${font Inter Bold:size=11}${color2}CPU${color1}${font Inter SemiBold:size=11}  ${cpu}%${alignr}${cpubar 6,180}
${voffset 6}${font Inter Bold:size=11}${color2}MEM${color1}${font Inter SemiBold:size=11}  ${memperc}%${alignr}${membar 6,180}
${voffset 6}${font Inter Bold:size=11}${color2}DISK${color1}${font Inter SemiBold:size=11}  ${fs_used_perc /}%${alignr}${fs_bar 6,180 /}
${voffset 10}${color3}${hr 2}
${voffset 10}${font Inter Bold:size=11}${color3}NET${color1}${font Inter SemiBold:size=11}  ${downspeed ${gw_iface}} ↓  ${upspeed ${gw_iface}} ↑
${if_existing /proc/driver/nvidia/version}${voffset 6}${font Inter Bold:size=11}${color4}GPU${color1}${font Inter SemiBold:size=11}  ${nvidia temp}°C  ${nvidia gpuutil}%${endif}
${voffset 6}${font Inter Bold:size=11}${color4}UP${color1}${font Inter SemiBold:size=11}  ${uptime_short}${font}
]];

