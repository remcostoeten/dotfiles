"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](fg:green)$directory$git_branch$git_status
[╰─](fg:green)$character"""

right_format = """$cmd_duration$time"""

add_newline = true

[character]
success_symbol = '[ ➜ ](bold fg:green)'
error_symbol = '[ ➜ ](bold fg:red)'
vimcmd_symbol = '[ ❮ ](bold fg:green)'
vimcmd_replace_one_symbol = '[ ❮ ](bold fg:magenta)'
vimcmd_replace_symbol = '[ ❮ ](bold fg:magenta)'
vimcmd_visual_symbol = '[ ❮ ](bold fg:yellow)'

[directory]
style = "fg:blue"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
read_only = " "

[git_branch]
symbol = "󰘬 "
style = "fg:magenta"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "fg:yellow"
format = '[$all_status$ahead_behind]($style)'
conflicted = " ⚔️ "
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?"
stashed = " S"
modified = " M"
staged = '[ ++\($count\) ](green)'
renamed = " R"
deleted = " D"

[cmd_duration]
min_time = 2_000
show_milliseconds = false
style = "fg:yellow"
format = '[ 󱆃 $duration ]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "fg:blue"
format = '[ 󱑃 $time ]($style)'

[python]
symbol = "󰌠 "
style = "fg:yellow"
format = '[ $symbol($version) ]($style)'

[rust]
symbol = "󱘗 "
style = "fg:red"
format = '[ $symbol($version) ]($style)'

[nodejs]
symbol = "󰌞 "
style = "fg:green"
format = '[ $symbol($version) ]($style)'
