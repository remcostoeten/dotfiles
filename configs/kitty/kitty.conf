# Kitty terminal configuration — Catppuccin Mocha, see-through + blurred

# Font
font_family       ComicShannsMono Nerd Font
bold_font         ComicShannsMono Nerd Font Bold
italic_font       auto
bold_italic_font  auto
font_size         18

# Spacing
letter_spacing    8.0
line_height       3.9

# Shell
shell /usr/bin/fish

# Window
window_padding_width 10
hide_window_decorations no
confirm_os_window_close 2

# Transparency & blur
background_opacity 0.65
background_blur 32
dynamic_background_opacity yes

# Cursor
cursor_shape          block
cursor_blink_interval 2.5

# Scrollback
scrollback_lines 10002

# Tab bar
tab_bar_style powerline
tab_bar_edge bottom
tab_bar_margin_width 2.0
tab_bar_margin_height 2.0

# Colors: warm sunset palette on dark plum
background #1a0d14
foreground #f0d8e0
selection_background #5a2e44
selection_foreground #ffeef5
cursor #ff9e64
cursor_text_color #1a0d14
url_color #ffb86c

# Black
color0  #2a1620
color8  #4a3340

# Red
color1  #ff6188
color9  #ff7a9c

# Green
color2  #a9dc76
color10 #bce68c

# Yellow
color3  #ffd866
color11 #ffe089

# Blue
color4  #78a9ff
color12 #93bcff

# Magenta
color5  #ab9df2
color13 #c4b8ff

# Cyan
color6  #78dce8
color14 #9ae6f0

# White
color7  #f0d8e0
color15 #ffffff

# Tab bar colors
active_tab_foreground   #3e1e2e
active_tab_background   #cba8f7
inactive_tab_foreground #a8adc8
inactive_tab_background #181827
tab_bar_background      #11113b

# Splits and window management
map ctrl+d launch --location=vsplit
map ctrl+h launch --location=hsplit
map ctrl+grave next_window

# Mouse
mouse_hide_wait 4.0
