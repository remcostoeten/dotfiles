name: tests

on:
  push:
  pull_request:

jobs:
  shell-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer tests
        run: |
          chmod +x tests/test_install.sh tests/test_packages.sh tests/test_set_sudo.sh tests/run.sh
          tests/run.sh
